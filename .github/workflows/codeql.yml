# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
name: "CodeQL"

on:
  push:
    branches: [ "master" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "master" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Setup both JDKs
    - name: Set up Java for Toolchains
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: |
          8
          25
        cache: 'maven'
        check-latest: true

    # DEBUG
    - name: Debug Toolchains
      run: |
        echo "--- Content of toolchains.xml ---"
        cat $HOME/.m2/toolchains.xml
        echo "--- Installed Java Environments ---"
        env | grep JAVA_HOME

    # Initialize CodeQL with Build-Mode 'manual'
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'java'
#        build-mode: manual
        build-mode: none

    # Manual Build with toolchain path
    # Maven should use the toolchains.xml generated by setup-java
    - name: Build with Maven
      run: |
        mvn clean package --batch-mode \
          -Dmaven.compiler.fork=false \
          -Dtoolchains.xml.path=$HOME/.m2/toolchains.xml \
          -DskipTests
      env:
        JAVA_HOME: ${{ env.JAVA_HOME_25_X64 }}
        CODEQL_EXTRACTOR_JAVA_RUN_ANNOTATION_PROCESSORS: true

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

        # Details on CodeQL's query packs refer to : https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning#using-queries-in-ql-packs
        queries: security-and-quality


    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
